<!DOCTYPE html>
<html lang="en-NZ">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leave a Review | NT Auto Works, Christchurch</title>
<meta name="description" content="Rate your experience with NT Auto Works — Christchurch mechanic and car servicing.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23f4581f'/><text x='50' y='70' font-family='Arial' font-size='52' font-weight='bold' fill='white' text-anchor='middle'>NT</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fjalla+One&family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .rate-wrap{max-width:640px;margin:0 auto;text-align:center;padding:clamp(2.5rem,6vw,4rem) 24px 5rem}
  .rate-card{background:var(--paper);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:clamp(2rem,5vw,3.2rem)}
  .star-row{display:flex;justify-content:center;gap:.4rem;margin:1.6rem 0 .6rem;flex-wrap:wrap}
  .star-row button{font-size:clamp(2.4rem,9vw,3.4rem);line-height:1;background:none;border:0;cursor:pointer;color:#d8d2c8;transition:transform .15s ease,color .15s ease;padding:.1rem}
  .star-row button:hover{transform:translateY(-4px) scale(1.08)}
  .star-row button.on{color:var(--accent)}
  .hint{color:var(--muted);font-size:.95rem;min-height:1.4em;font-weight:600}
  .rate-note{color:var(--muted);font-size:.85rem;margin-top:1.6rem}
  .back{display:inline-flex;align-items:center;gap:.4rem;color:#fff;margin-top:1.5rem;font-weight:700;opacity:.85}
  .back:hover{opacity:1}
</style>
</head>
<body>
<section class="page-hero">
  <div class="wrap">
    <span class="eyebrow">NT Auto Works</span>
    <h1>How did we do?</h1>
    <p>Your feedback keeps the workshop honest and helps other Christchurch drivers find us. Tap a star to get started.</p>
    <a class="back" href="index.html"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Back to site</a>
  </div>
</section>

<div class="rate-wrap">
  <div class="rate-card">
    <span class="eyebrow">Rate your experience</span>
    <div class="star-row" id="stars">
      <button data-v="1" aria-label="1 star">★</button>
      <button data-v="2" aria-label="2 stars">★</button>
      <button data-v="3" aria-label="3 stars">★</button>
      <button data-v="4" aria-label="4 stars">★</button>
      <button data-v="5" aria-label="5 stars">★</button>
    </div>
    <p class="hint" id="hint">Tap a star from 1 to 5</p>
    <p class="rate-note">4–5 stars sends you to Google. 1–3 stars opens a private form so we can put it right directly.</p>
  </div>
</div>

<script>
  // 4-5 stars -> Google review; 1-3 stars -> private feedback form
  var GOOGLE_REVIEW_URL = "https://g.page/r/PLACEHOLDER";
  var hints = {1:"Sorry to hear that — let's make it right.",2:"We'd like to fix this for you.",3:"Thanks — tell us how we can do better.",4:"Brilliant! Taking you to Google…",5:"Awesome! Taking you to Google…"};
  var btns = document.querySelectorAll('#stars button');
  var hint = document.getElementById('hint');
  btns.forEach(function(b){
    b.addEventListener('mouseenter',function(){ paint(+b.dataset.v); });
    b.addEventListener('click',function(){
      var v = +b.dataset.v; paint(v); hint.textContent = hints[v];
      setTimeout(function(){
        if(v>=4){ window.location.href = GOOGLE_REVIEW_URL; }
        else { window.location.href = "private.html?rating="+v; }
      }, 650);
    });
  });
  document.getElementById('stars').addEventListener('mouseleave',function(){ paint(0); });
  function paint(v){ btns.forEach(function(b){ b.classList.toggle('on', +b.dataset.v <= v); }); }
</script>
</body>
</html>
